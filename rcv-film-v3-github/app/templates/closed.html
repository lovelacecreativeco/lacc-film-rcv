{% extends "base.html" %}
{% block title %}Closed — Film RCV{% endblock %}
{% block content %}
<div class="card" style="text-align:center; padding:3rem 2rem;">
  <div style="font-size:3.5rem; margin-bottom:1rem;">&#128274;</div>
  <h2 style="color:var(--text); font-size:1.4rem; margin-bottom:0.5rem;">
    {% if poll %}{{ poll.name }}{% else %}This Poll{% endif %} is Closed
  </h2>
  <p style="color:var(--muted); max-width:380px; margin:0 auto; line-height:1.6;">
    Voting is not currently open. Check back when your instructor opens the poll.
  </p>
</div>
{% endblock %}
